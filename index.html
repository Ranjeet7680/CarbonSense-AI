    <!-- Custom styling utilities matching mockup -->
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(226, 232, 240, 0.8);
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(226, 232, 240, 0.8);
      }
      .text-gradient {
        background: linear-gradient(135deg, #154212 0%, #3a6758 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .login-gradient {
        background: linear-gradient(135deg, #154212 0%, #2d5a27 50%, #3a6758 100%);
      }
      .animated-float {
        animation: float 6s ease-in-out infinite;
      }
      .pulse-green {
        animation: pulse 2s infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(78, 222, 163, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(78, 222, 163, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(78, 222, 163, 0); }
      }
      .chat-scroll::-webkit-scrollbar { width: 4px; }
      .chat-scroll::-webkit-scrollbar-track { background: transparent; }
      .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
